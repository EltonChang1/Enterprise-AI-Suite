services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: enterprise_ai_suite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  otel:
    image: jaegertracing/all-in-one:1.59
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 4100
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/enterprise_ai_suite
      REDIS_URL: redis://redis:6379
      AUTH_MODE: jwt
      JWT_SECRET: local-dev-secret
      JWT_ISSUER: enterprise-ai-suite
      JWT_AUDIENCE: enterprise-api
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel:4318/v1/traces
    depends_on:
      - postgres
      - redis
      - otel
    ports:
      - "4100:4100"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      JOBS_QUEUE_NAME: enterprise-jobs
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5178:80"

volumes:
  pg_data:
