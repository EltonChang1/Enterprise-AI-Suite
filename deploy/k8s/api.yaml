apiVersion: apps/v1
kind: Deployment
metadata:
  name: suite-api
  namespace: enterprise-ai-suite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: suite-api
  template:
    metadata:
      labels:
        app: suite-api
    spec:
      containers:
        - name: api
          image: your-registry/enterprise-ai-suite-api:latest
          ports:
            - containerPort: 4100
          envFrom:
            - configMapRef:
                name: suite-config
            - secretRef:
                name: suite-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4100
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: suite-api
  namespace: enterprise-ai-suite
spec:
  selector:
    app: suite-api
  ports:
    - port: 4100
      targetPort: 4100
