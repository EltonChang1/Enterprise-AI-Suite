apiVersion: apps/v1
kind: Deployment
metadata:
  name: suite-web
  namespace: enterprise-ai-suite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: suite-web
  template:
    metadata:
      labels:
        app: suite-web
    spec:
      containers:
        - name: web
          image: your-registry/enterprise-ai-suite-web:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: suite-web
  namespace: enterprise-ai-suite
spec:
  selector:
    app: suite-web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: suite-web
  namespace: enterprise-ai-suite
spec:
  rules:
    - host: enterprise-ai-suite.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: suite-web
                port:
                  number: 80
